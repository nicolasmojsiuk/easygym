{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login | EasyGym</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js"></script>

<style>
:root {
  --bg:#282a36;
  --surface:#21222c;
  --surface2:#383a4a;
  --border:#44475a;
  --purple:#bd93f9;
  --pink:#ff79c6;
  --cyan:#8be9fd;
  --green:#50fa7b;
  --red:#ff5555;
  --yellow:#f1fa8c;
  --fg:#f8f8f2;
  --fg-dim:#6272a4;
}

body{
  background:var(--bg);
  color:var(--fg);
  font-family:'Segoe UI',sans-serif;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Card login */
.login-card{
  width:100%;
  max-width:380px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:35px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.logo{
  text-align:center;
  margin-bottom:25px;
}

.logo-icon{
  width:50px;
  height:50px;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  margin:auto;
  margin-bottom:10px;
}

.logo h4{
  font-weight:700;
  margin:0;
}

.logo span{
  color:var(--purple);
}

/* inputs */
.form-control{
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--fg);
}

.form-control:focus{
  border-color:var(--purple);
  box-shadow:0 0 0 3px rgba(189,147,249,.2);
}

.form-label{
  color:var(--fg-dim);
  font-size:13px;
}

/* button */
.btn-primary{
  background:var(--purple);
  border:none;
  font-weight:600;
  color:#1e1e2e;
}

.btn-primary:hover{
  background:#a679f2;
}

.error{
  background:rgba(255,85,85,.15);
  border:1px solid rgba(255,85,85,.3);
  color:var(--red);
  padding:10px;
  border-radius:6px;
  font-size:13px;
  margin-bottom:15px;
}

/* responsive */
@media (max-width:480px){
  .login-card{
    margin:20px;
    padding:25px;
  }
}
</style>
</head>

<body>

<div class="login-card">

  <div class="logo">
    <div class="logo-icon">💪</div>
    <h4>Easy<span>Gym</span></h4>
    <small style="color:var(--fg-dim)">Panel de administración</small>
  </div>

{% if error %}
    <div class="error">
      <i class="fas fa-exclamation-circle me-2"></i>
      {{ error }}
    </div>
{% endif %}

  <form method="post">
    {% csrf_token %}

    <div class="mb-3">
      <label class="form-label">Usuario</label>
      <input type="text" name="username" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Contraseña</label>
      <input type="password" name="password" class="form-control" required>
    </div>

    <button class="btn btn-primary w-100">
      <i class="fas fa-right-to-bracket me-2"></i>
      Ingresar
    </button>

  </form>

</div>

</body>
</html>
